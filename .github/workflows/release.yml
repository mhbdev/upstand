name: Release and Publish Docker Images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Next.js validates this public build-time variable even though CI does
      # not connect to a live API. Production installers provide the real URL.
      NEXT_PUBLIC_SERVER_URL: https://api.example.invalid
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun downloads
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-release-${{ hashFiles('bun.lock', 'turbo.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-turbo-release-${{ hashFiles('bun.lock', 'turbo.json') }}-
            ${{ runner.os }}-turbo-

      - name: Check Types
        run: bun run check-types

      - name: Run Tests
        run: bun run test

  build-and-publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: .
            file: apps/server/Dockerfile
            scope: upstand-server
            build_args: ""
          - name: web
            context: .
            file: apps/web/Dockerfile
            scope: upstand-web
            build_args: |
              NEXT_PUBLIC_SERVER_URL=https://api.example.invalid
              NEXT_PUBLIC_UPSTAND_VERSION=${{ github.ref_name }}
          - name: fumadocs
            context: .
            file: apps/fumadocs/Dockerfile
            scope: upstand-fumadocs
            build_args: ""
          - name: monitoring
            context: apps/monitoring
            file: apps/monitoring/Dockerfile
            scope: upstand-monitoring
            build_args: ""
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          echo "repo=${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}-${{ matrix.name }}:latest
            ghcr.io/${{ steps.meta.outputs.repo }}-${{ matrix.name }}:${{ steps.meta.outputs.tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,scope=${{ matrix.scope }},mode=max
          provenance: mode=max
          sbom: true

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all release images and create manifest
        env:
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          repo="${GH_REPO,,}"
          manifest_file="$RUNNER_TEMP/upstand-release-manifest.json"
          images='[]'

          for name in server web fumadocs monitoring; do
            image="ghcr.io/${repo}-${name}:${RELEASE_VERSION}"
            inspect="$(docker buildx imagetools inspect "$image")"
            digest="$(awk '$1 == "Digest:" { print $2; exit }' <<< "$inspect")"
            if [[ ! "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "Could not verify immutable digest for $image" >&2
              exit 1
            fi
            images="$(jq --arg name "$name" --arg image "$image" --arg digest "$digest" '. + [{name: $name, image: $image, digest: $digest}]' <<< "$images")"
          done

          jq -n \
            --arg version "$RELEASE_VERSION" \
            --argjson images "$images" \
            '{schemaVersion: 1, version: $version, images: $images}' \
            > "$manifest_file"

          cat "$manifest_file"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.ref_name }}
          MANIFEST_FILE: ${{ runner.temp }}/upstand-release-manifest.json
        run: |
          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "$MANIFEST_FILE#upstand-release-manifest.json"
          else
            gh release create "$RELEASE_VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "Upstand $RELEASE_VERSION" \
              --generate-notes \
              "$MANIFEST_FILE#upstand-release-manifest.json"
          fi
