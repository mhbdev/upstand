name: Release and Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Next.js validates this public build-time variable even though CI does
      # not connect to a live API. Production installers provide the real URL.
      NEXT_PUBLIC_SERVER_URL: https://api.example.invalid
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-release-${{ hashFiles('bun.lock', 'turbo.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-turbo-release-${{ hashFiles('bun.lock', 'turbo.json') }}-
            ${{ runner.os }}-turbo-

      - name: Check Types
        run: bun run check-types

      - name: Run Tests
        run: bun run test

  build-and-publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            TAG_NAME="latest"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Build and Push Server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}-server:latest
            ghcr.io/${{ steps.meta.outputs.repo }}-server:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=upstand-server
          cache-to: type=gha,scope=upstand-server,mode=max

      - name: Build and Push Web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}-web:latest
            ghcr.io/${{ steps.meta.outputs.repo }}-web:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://api.example.invalid
          cache-from: type=gha,scope=upstand-web
          cache-to: type=gha,scope=upstand-web,mode=max

      - name: Build and Push Fumadocs
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/fumadocs/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}-fumadocs:latest
            ghcr.io/${{ steps.meta.outputs.repo }}-fumadocs:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=upstand-fumadocs
          cache-to: type=gha,scope=upstand-fumadocs,mode=max
