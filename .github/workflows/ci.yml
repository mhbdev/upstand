name: Continuous Integration

on:
  pull_request:
    branches: [master, canary]
  push:
    branches: [master, canary]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The web app validates this at build time. It is deliberately a reserved
  # CI-only origin; deployments inject their real HTTPS API origin.
  NEXT_PUBLIC_SERVER_URL: https://api.example.invalid

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ hashFiles('bun.lock', 'turbo.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ hashFiles('bun.lock', 'turbo.json') }}-
            ${{ runner.os }}-turbo-
      - name: Check affected types
        if: github.event_name == 'pull_request'
        run: bunx turbo run check-types --filter="...[origin/${{ github.base_ref }}]"
      - name: Check all types
        if: github.event_name != 'pull_request'
        run: bun run check-types
      - name: Test affected packages
        if: github.event_name == 'pull_request'
        run: bunx turbo run test --filter="...[origin/${{ github.base_ref }}]"
      - name: Test all packages
        if: github.event_name != 'pull_request'
        run: bun run test
      - name: Build affected applications
        if: github.event_name == 'pull_request'
        run: bunx turbo run build --filter="...[origin/${{ github.base_ref }}]"
      - name: Build all applications
        if: github.event_name != 'pull_request'
        run: bun run build
