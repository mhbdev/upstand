name: Continuous Integration

on:
  pull_request:
    branches: [master, canary]
  push:
    branches: [master, canary]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The web app validates this at build time. It is deliberately a reserved
  # CI-only origin; deployments inject their real HTTPS API origin.
  NEXT_PUBLIC_SERVER_URL: https://api.example.invalid

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check types
        run: bun run check-types
      - name: Run tests
        run: bun test packages
      - name: Build applications
        run: bun run build
