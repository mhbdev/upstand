name: Publish Canary Images

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
    branches: [canary]
  workflow_dispatch:

concurrency:
  group: upstand-canary
  cancel-in-progress: true

jobs:
  verify-and-publish:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository)
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SERVER_URL: https://api.example.invalid
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.image.outputs.repository }}-server:canary
          cache-from: type=gha,scope=upstand-server
          cache-to: type=gha,scope=upstand-server,mode=max
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.image.outputs.repository }}-web:canary
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://api.example.invalid
            NEXT_PUBLIC_UPSTAND_VERSION=canary
          cache-from: type=gha,scope=upstand-web
          cache-to: type=gha,scope=upstand-web,mode=max
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/fumadocs/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.image.outputs.repository }}-fumadocs:canary
          cache-from: type=gha,scope=upstand-fumadocs
          cache-to: type=gha,scope=upstand-fumadocs,mode=max
