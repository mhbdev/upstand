name: Publish Canary Images

on:
  push:
    branches: [canary]
  workflow_dispatch:

concurrency:
  group: upstand-canary
  cancel-in-progress: true

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SERVER_URL: https://api.example.invalid
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check-types
      - run: bun test packages
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.image.outputs.repository }}-server:canary
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.image.outputs.repository }}-web:canary
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://api.example.invalid
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/fumadocs/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.image.outputs.repository }}-fumadocs:canary
          cache-from: type=gha
          cache-to: type=gha,mode=max
