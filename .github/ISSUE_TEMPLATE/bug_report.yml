name: Bug report
description: Report a reproducible defect in Upstand
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Upstand. Search existing issues before filing a new report.

        Do not include passwords, tokens, cookies, private keys, environment files, personal data, or other secrets. Suspected vulnerabilities must be reported through a private security advisory.
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight checks
      options:
        - label: I searched open and closed issues for duplicates.
          required: true
        - label: I reviewed the relevant documentation and troubleshooting guide.
          required: true
        - label: This is not a security vulnerability or sensitive disclosure.
          required: true
  - type: input
    id: version
    attributes:
      label: Upstand version or commit
      description: Provide the release version, image digest, or commit SHA.
      placeholder: v0.1.41 or sha256:...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Web dashboard / PWA
        - API / tRPC / Hono server
        - Authentication / organizations / SSO / SCIM
        - Deployments / queues / workers
        - Applications / databases / backups
        - Docker / Docker Swarm / remote servers
        - Caddy / domains / TLS / access logs
        - Git providers / registries / webhooks
        - Monitoring / notifications
        - Installer / updates / release images
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Tagged release images using install.sh
        - Source installation using install.sh
        - Local Docker Compose development stack
        - Manual development environment
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and topology
      description: Include host OS, CPU architecture, Docker and Compose versions, Swarm role, proxy/DNS topology, browser if relevant, and whether the target is local or remote. Redact sensitive values.
      placeholder: |
        OS: Ubuntu 24.04
        Architecture: amd64
        Docker: ...
        Swarm: single manager / multi-node
        Browser: ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest deterministic sequence that reproduces the problem.
      placeholder: |
        1. Configure ...
        2. Open ...
        3. Run ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste only the smallest relevant excerpt. Remove credentials, tokens, cookies, private keys, email addresses, IPs when sensitive, and personal data.
      render: shell
  - type: dropdown
    id: regression
    attributes:
      label: Regression status
      options:
        - Unknown
        - This never worked for me
        - This worked in an earlier Upstand version
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include related configuration, resource type, provider, suspected scope, or links to non-sensitive reproductions.
