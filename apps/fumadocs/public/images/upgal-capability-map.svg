<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">UpGal capability map</title>
  <desc id="desc">A diagram showing the dashboard user, UpGal, authorization, and the platform capabilities available to the agent.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#020617"/>
  <rect x="40" y="50" width="240" height="120" rx="18" fill="url(#panel)" stroke="#60a5fa" stroke-width="2"/>
  <text x="160" y="98" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="22" font-weight="700">Dashboard user</text>
  <text x="160" y="132" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Natural-language request</text>
  <rect x="360" y="50" width="240" height="120" rx="18" fill="url(#panel)" stroke="#a78bfa" stroke-width="2"/>
  <text x="480" y="98" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="22" font-weight="700">UpGal</text>
  <text x="480" y="132" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Read, plan, request approval</text>
  <rect x="680" y="50" width="240" height="120" rx="18" fill="url(#panel)" stroke="#34d399" stroke-width="2"/>
  <text x="800" y="98" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="22" font-weight="700">Authorization</text>
  <text x="800" y="132" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Organization + tool scope</text>
  <path d="M280 110 H350" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M600 110 H670" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M800 170 V220" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="80" y="260" width="1040" height="280" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="600" y="300" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="21" font-weight="700">Permission-scoped platform capabilities</text>
  <g font-family="Arial, sans-serif" font-size="16">
    <rect x="120" y="340" width="210" height="70" rx="14" fill="#172554" stroke="#3b82f6"/><text x="225" y="382" text-anchor="middle" fill="#dbeafe">Templates + deploy</text>
    <rect x="360" y="340" width="210" height="70" rx="14" fill="#172554" stroke="#3b82f6"/><text x="465" y="382" text-anchor="middle" fill="#dbeafe">Resources + config</text>
    <rect x="600" y="340" width="210" height="70" rx="14" fill="#172554" stroke="#3b82f6"/><text x="705" y="382" text-anchor="middle" fill="#dbeafe">Monitoring + metrics</text>
    <rect x="840" y="340" width="210" height="70" rx="14" fill="#172554" stroke="#3b82f6"/><text x="945" y="382" text-anchor="middle" fill="#dbeafe">Audit search</text>
    <rect x="240" y="440" width="210" height="70" rx="14" fill="#052e2b" stroke="#34d399"/><text x="345" y="482" text-anchor="middle" fill="#a7f3d0">Projects + environments</text>
    <rect x="510" y="440" width="210" height="70" rx="14" fill="#052e2b" stroke="#34d399"/><text x="615" y="482" text-anchor="middle" fill="#a7f3d0">Deployments + controls</text>
    <rect x="780" y="440" width="210" height="70" rx="14" fill="#052e2b" stroke="#34d399"/><text x="885" y="482" text-anchor="middle" fill="#a7f3d0">Servers + Docker</text>
  </g>
</svg>
