<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <rect width="1200" height="750" fill="#f8fafc" rx="16"/>
  <rect x="2" y="2" width="1196" height="746" fill="none" stroke="#e2e8f0" stroke-width="4" rx="14"/>
  
  <!-- Header / Navigation -->
  <rect x="0" y="0" width="1200" height="70" fill="#ffffff" rx="16"/>
  <line x1="0" y1="70" x2="1200" y2="70" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Logo -->
  <circle cx="50" cy="35" r="16" fill="#4f46e5"/>
  <path d="M44 35 L50 27 L56 35 Z" fill="#ffffff"/>
  <text x="78" y="42" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#1e293b">Upstand</text>
  
  <!-- Nav links -->
  <text x="220" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Dashboard</text>
  <text x="320" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Projects</text>
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Servers</text>
  <text x="480" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Swarm</text>
  <text x="550" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Settings</text>
  
  <!-- Sidebar -->
  <rect x="25" y="95" width="220" height="630" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="45" y="135" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">MONITORING</text>
  <text x="55" y="175" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#475569">Metrics</text>
  <text x="55" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#475569">Containers</text>
  <rect x="35" y="245" width="200" height="36" fill="#e0e7ff" rx="8"/>
  <text x="55" y="268" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4f46e5">SSH Terminal</text>
  <text x="55" y="315" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#475569">Container Logs</text>
  
  <!-- Main Workspace Area -->
  <rect x="270" y="95" width="905" height="630" fill="#ffffff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  
  <!-- Workspace Header -->
  <text x="300" y="145" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#1e293b">Web SSH Terminal</text>
  <text x="300" y="170" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Secure console shell access to nodes</text>
  
  <!-- Terminal Frame -->
  <rect x="300" y="200" width="845" height="490" fill="#0f172a" rx="12"/>
  
  <!-- Terminal window controls -->
  <circle cx="325" cy="222" r="6" fill="#ef4444"/>
  <circle cx="345" cy="222" r="6" fill="#f59e0b"/>
  <circle cx="365" cy="222" r="6" fill="#10b981"/>
  
  <!-- Terminal Text -->
  <text x="320" y="265" font-family="Courier, monospace" font-size="14" fill="#38bdf8">manager-node:~$ ssh root@worker-1</text>
  <text x="320" y="290" font-family="Courier, monospace" font-size="14" fill="#94a3b8">Welcome to Ubuntu 22.04.3 LTS (GNU/Linux 5.15.0-88-generic x86_64)</text>
  <text x="320" y="315" font-family="Courier, monospace" font-size="14" fill="#94a3b8"> * Documentation:  https://help.ubuntu.com</text>
  <text x="320" y="340" font-family="Courier, monospace" font-size="14" fill="#94a3b8"> * Management:     https://landscape.canonical.com</text>
  <text x="320" y="365" font-family="Courier, monospace" font-size="14" fill="#94a3b8"> * Support:        https://ubuntu.com/pro</text>
  
  <text x="320" y="405" font-family="Courier, monospace" font-size="14" fill="#38bdf8">worker-1:~$ docker ps --format "table {{.Names}}\t{{.Status}}"</text>
  <text x="320" y="430" font-family="Courier, monospace" font-size="14" fill="#f8fafc">NAMES                       STATUS</text>
  <text x="320" y="455" font-family="Courier, monospace" font-size="14" fill="#34d399">api-service.1.asfd91    Up 4 hours (healthy)</text>
  <text x="320" y="480" font-family="Courier, monospace" font-size="14" fill="#34d399">web-dashboard.1.91ba2   Up 4 hours</text>
  <text x="320" y="505" font-family="Courier, monospace" font-size="14" fill="#38bdf8">worker-1:~$ _</text>
  <rect x="420" y="492" width="8" height="15" fill="#38bdf8" animate="pulse"/>
</svg>
