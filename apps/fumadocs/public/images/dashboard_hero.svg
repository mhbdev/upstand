  <text x="745" y="315" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#475569">Status: Running (2 replicas)</text>
  <rect x="1040" y="235" width="80" height="28" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="6"/>
  <text x="1062" y="253" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">Deploy</text>
  
