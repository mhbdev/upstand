  <text x="850" y="465" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">Active Swarm Tasks</text>
  <circle cx="977" cy="545" r="45" fill="none" stroke="#e2e8f0" stroke-width="12"/>
  <circle cx="977" cy="545" r="45" fill="none" stroke="#6366f1" stroke-width="12" stroke-dasharray="190, 280"/>
  <text x="977" y="550" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">74%</text>
